<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · Business Progress Management</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell">

  <aside class="sidebar">
    <h2>Business Progress Management</h2>
    <nav>
      <a href="dashboard.html" class="active">Dashboard</a>
      <a href="builder.html" id="nav-builder">New workflow</a>
      <a href="#" id="logout-link">Log out</a>
    </nav>
    <div class="user-tag" id="user-tag">
      <!-- filled by JS: "Signed in as raj (manager)" -->
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>Your workflows</h1>
    </div>

    <section id="my-turn-section">
      <h3>Waiting on you</h3>
      <div id="my-turn-list">
        <!-- workflow cards where current user is the assignee for the current step -->
        <div class="empty-state">Nothing needs your action right now.</div>
      </div>
    </section>

    <section id="all-workflows-section">
      <h3>All workflows</h3>
      <div id="all-workflows-list">
        <!-- read-only / in-progress cards for everything else -->
        <div class="empty-state">No workflows yet. Create one to get started.</div>
      </div>
    </section>
  </main>

</div>

<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
